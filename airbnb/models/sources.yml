version: 2
sources:
  - name: airbnb
    schema: raw
    tables:
      - name: listings
        description: "This table contains information about Airbnb listings."
        identifier: raw_listings
        columns:        
          - name: price
            tests:
              - dbt_expectations.expect_column_values_to_match_regex:
                  arguments:
                    regex: "^\\\\$[0-9][0-9\\\\.]+$"
          - name: room_type          
            tests:
              - dbt_expectations.expect_column_distinct_count_to_equal:
                  arguments:
                    value: 4


      - name: reviews
        description: "This table contains information about Airbnb reviews."
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count: 1, period: hour}
            # error_after: {count: 24, period: hour}

      - name: hosts
        description: "This table contains information about Airbnb hosts."
        identifier: raw_hosts